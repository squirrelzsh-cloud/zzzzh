<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script type="module" crossorigin src="/assets/index-BAUX2qP1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CNal_AWt.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- Early audio: DOM-attached muted-first autoplay (browsers allow muted, then unmute) -->
    <script>
      (function() {
        var a = document.createElement('audio');
        a.id = 'bgm-audio';
        a.src = '/media/111.mp3';
        a.loop = true;
        a.autoplay = true;
        a.preload = 'auto';
        a.muted = true;
        a.volume = parseFloat(localStorage.getItem('zsh-music-volume') || '0.04');
        a.style.display = 'none';
        document.body.appendChild(a);
        window.__bgmAudio = a;
        a.play().then(function() {
          a.__playing = true;
          // Unmute once playback is stable — browser allows it after muted play starts
          setTimeout(function() { a.muted = false; }, 500);
        }).catch(function() {
          a.__playing = false;
          // Even muted play failed (mobile Safari blocks all autoplay) — wait for gesture
          var resume = function() {
            a.muted = true;
            a.play().then(function() {
              a.__playing = true;
              setTimeout(function() { a.muted = false; }, 500);
            }).catch(function() {});
            document.removeEventListener('click', resume);
            document.removeEventListener('touchstart', resume);
            document.removeEventListener('keydown', resume);
          };
          document.addEventListener('click', resume, { passive: true });
          document.addEventListener('touchstart', resume, { passive: true });
          document.addEventListener('keydown', resume, { passive: true });
        });
      })();
    </script>
  </body>
</html>
